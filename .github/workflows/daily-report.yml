name: Daily Market Report

on:
  push:
    branches: [main]   # deploy immediately on every push to main
  schedule:
    # Every 5 min during trading hours 9:25 AM–4:05 PM ET (13:25–20:05 UTC) Mon–Fri
    # GitHub minimum cron interval is 5 minutes
    - cron: '*/5 13-20 * * 1-5'
    # Pre-market at 8:00 AM ET and post-market recap at 4:30 PM ET
    - cron: '0 12 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPICAPIKEY }}
        run: |
          mkdir -p dist
          python3 daily_market_report.py --no-open --out dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
